<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FaceReveal | AI Face Analysis & Personality Insights</title>

    <link rel="stylesheet" href="analysis.css" />
    <script src="https://sdk.cashfree.com/js/v3/cashfree.js"></script>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <!-- HEADER -->
    <header class="header">
      <div class="logo">
        <!-- <div class="logo-icon"></div> -->
        <img src="../assets/face-scan.gif" class="logo-icon" />
        <span>FaceReveal</span>
      </div>
    </header>

    <div class="face-row">
      <div class="face-circle">
        <div class="img-wrapper">
          <img id="userImage" src="" />
        </div>
        <i class="fa-solid fa-circle-check verified-icon"></i>
      </div>

      <div class="community-stack">
        <div class="stack">
          <img class="mini-face" />
          <img class="mini-face" />
          <img class="mini-face" />
        </div>
        <p class="community-text">Recently analyzed profiles</p>
      </div>
    </div>

    <!-- MAIN -->
    <div class="analysis-container">
      <!-- TITLE -->
      <h1 class="title">Analyzing Facial Patterns</h1>

      <!-- SUBTEXT -->
      <p class="subtitle">
        Our AI is evaluating micro-expressions and behavioral traits to generate
        your personality profile
      </p>

      <!-- RESULT BOX (future content yaha aayega) -->
      <div class="result-box">
        <div id="freeResults" style="opacity: 0"></div>

        <div class="unlock-cta">
          <div class="unlock-meta">
            <span class="unlock-price"
              ><i class="fa-solid fa-bolt"></i> Unlock in just ₹1</span
            >
            <span class="unlock-trust"
              ><i class="fa-solid fa-shield-halved"></i> Secure via
              Cashfree</span
            >
          </div>
          <button id="unlockBtn" type="button">
            <i class="fa-solid fa-lock"></i>
            Unlock Full Analysis
          </button>
        </div>
      </div>
    </div>

    <script type="module" src="analysis.js"></script>
  </body>
</html>
