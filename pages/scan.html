<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Face Scan — FaceReveal</title>

        <!-- Favicon -->
        <link rel="icon" href="/favicon.ico" />
        <link
          rel="icon"
          href="/assets/favicon.png"
          type="image/png"
          sizes="32x32"
        />
        <link rel="apple-touch-icon" href="/assets/favicon.png" />

    <script
      defer
      src="https://unpkg.com/face-api.js@0.22.2/dist/face-api.min.js"
    ></script>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <link rel="stylesheet" href="scan.css" />
  </head>
  <body>
    <!-- HEADER (same feel) -->
    <header class="header">
      <div class="logo">
        <!-- <div class="logo-icon"></div> -->
        <img src="../assets/face-scan.gif" class="logo-icon" />
        <span>FaceReveal</span>
      </div>
    </header>

    <div class="trust-bar">
      <div class="trust-track">
        <span class="verified">
          <i class="fa-solid fa-shield-check"></i> Verified Secure
        </span>

        <span><i class="fa-solid fa-lock"></i> No Data Stored</span>
        <span><i class="fa-solid fa-user-shield"></i> Privacy Protected</span>
        <span><i class="fa-solid fa-bolt"></i> Instant Processing</span>

        <!-- duplicate -->
        <span class="verified">
          <i class="fa-solid fa-shield-check"></i> Verified Secure
        </span>

        <span><i class="fa-solid fa-lock"></i> No Data Stored</span>
        <span><i class="fa-solid fa-user-shield"></i> Privacy Protected</span>
        <span><i class="fa-solid fa-bolt"></i> Instant Processing</span>
      </div>
    </div>

    <!-- MAIN -->
    <div class="scan-container">
      <!-- CAMERA CIRCLE -->
      <div class="camera-wrapper">
        <!-- progress ring -->
        <svg class="progress-ring" width="260" height="260">
          <circle cx="130" cy="130" r="120" class="ring-bg" />
          <circle cx="130" cy="130" r="120" class="ring-progress" />
        </svg>

        <!-- 🎬 SCAN ANIMATION -->
        <video id="scanAnimation" autoplay loop muted playsinline>
          <source src="../assets/scan.webm" type="video/webm" />
        </video>

        <!-- video -->
        <video id="video" autoplay playsinline></video>

        <!-- overlay text -->
        <div class="overlay-text"></div>

        <!-- fake scan corners -->
        <div class="corners">
          <span></span><span></span><span></span><span></span>
        </div>
      </div>

      <!-- STATUS -->
      <p id="statusText">Waiting for camera...</p>

      <!-- BUTTON -->
      <button id="startBtn">Enable Camera</button>
      <div class="action-row">
        <button id="captureBtn" disabled>Capture</button>
        <button id="retryBtn" disabled><i class="fa-solid fa-rotate-right"></i></button>
      </div>
    </div>

    <script src="scan.js"></script>
  </body>
</html>
